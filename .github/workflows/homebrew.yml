name: Update Homebrew formula

on:
  release:
    types: [published]

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}

      - name: Generate formula
        run: |
          chmod +x scripts/update-homebrew-formula.sh
          ./scripts/update-homebrew-formula.sh "${{ steps.version.outputs.version }}"

      - name: Checkout homebrew tap
        uses: actions/checkout@v6
        with:
          repository: LightbridgeLab/homebrew-omon
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Commit and push formula
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cp homebrew-omon/Formula/omon.rb tap/Formula/omon.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/omon.rb
          git diff --staged --quiet && exit 0
          git commit -m "omon ${VERSION}"
          git push
